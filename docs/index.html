<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Eneba LATAM — Compra juegos, recargas, software y tarjetas regalo al mejor precio." />
  <title>Eneba LATAM — Juegos y ofertas digitales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="site-header">
      <div class="header-inner">
        <!-- Fila superior: logo · búsqueda · utilidades -->
        <div class="header-top">
          <button id="logo-btn" class="logo-btn" aria-label="Ir a inicio">
            <img src="assets/logo-eneba.png" alt="Eneba" class="logo-img" width="158" height="42" />
          </button>

          <div class="search-wrap">
            <span class="search-icon" id="search-icon-slot"></span>
            <input id="search-input" type="search" placeholder="Busca juegos, recargas y más" class="search-input" autocomplete="off" aria-label="Buscar" />
            <div id="search-panel" class="search-panel hidden"></div>
          </div>

          <div class="header-actions">
            <div class="locale-wrap">
              <button id="locale-btn" class="locale-btn" aria-haspopup="listbox" aria-expanded="false" aria-label="Región y moneda">
                <span id="locale-flag-slot" class="locale-btn__flag"></span>
                <span id="locale-currency-label" class="locale-btn__currency">COP</span>
                <span id="locale-chevron" class="locale-btn__chevron"></span>
              </button>
              <div id="locale-panel" class="locale-panel hidden" role="listbox" aria-label="Seleccionar región y moneda"></div>
            </div>

            <button id="auth-btn" class="header-btn header-btn--auth">
              <span id="auth-icon-slot"></span>
              <span id="auth-label" class="header-btn__label">Iniciar sesión</span>
            </button>

            <button id="cart-btn" class="header-btn header-btn--cart" aria-label="Carrito">
              <span id="cart-icon-slot"></span>
              <span id="cart-count" class="cart-count hidden">0</span>
            </button>

            <button id="mobile-nav-toggle" class="header-btn mobile-nav-toggle" aria-label="Menú"></button>
          </div>
        </div>

        <!-- Fila inferior: navegación principal (sin duplicar búsqueda ni login) -->
        <nav id="l1-nav" class="l1-nav" aria-label="Navegación principal"></nav>
      </div>
    </header>

    <div class="page-wrap">
      <nav id="breadcrumbs" class="breadcrumbs" aria-label="Migas de pan"></nav>
      <main id="main-content" class="main-content"></main>
    </div>

    <footer id="site-footer" class="site-footer"></footer>

    <div id="cart-overlay" class="cart-overlay hidden"></div>
    <aside id="cart-drawer" class="cart-drawer" role="dialog" aria-label="Carrito">
      <div class="cart-drawer__head">
        <h2 id="cart-title" class="cart-drawer__title">Bolsa de compra</h2>
        <button id="cart-close" class="header-btn" aria-label="Cerrar carrito"><span id="cart-close-icon"></span></button>
      </div>
      <div id="cart-steps" class="cart-steps"></div>
      <div id="cart-body" class="cart-drawer__body"></div>
      <div id="cart-footer" class="cart-drawer__foot"></div>
    </aside>

    <div id="toast-container" class="toast-container" aria-live="polite"></div>
    <div class="prototype-badge">Vista previa</div>
  </div>

  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="icons.js"></script>
  <script src="script.js"></script>
</body>
</html>
