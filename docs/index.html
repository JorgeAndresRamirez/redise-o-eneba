<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eneba LATAM — Rediseño UX (Prototipo)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            eneba: {
              purple: '#4A148C',
              'purple-dark': '#3C128C',
              orange: '#FF5E00',
              green: '#00FF7F',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-eneba-purple-dark text-white min-h-screen">
  <div id="app" class="relative min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-eneba-purple border-b border-white/20 sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4 flex-wrap">
        <button id="logo-btn" class="text-2xl font-bold tracking-tight shrink-0 hover:opacity-90">eneba</button>
        <div class="flex-1 min-w-[200px] max-w-2xl relative">
          <input
            id="search-input"
            type="search"
            placeholder="Busca juegos, recargas y más"
            class="w-full bg-eneba-purple-dark border border-white/40 rounded-lg px-4 py-2.5 pr-10 text-sm focus:outline-none focus:border-eneba-green"
            autocomplete="off"
          />
          <div id="search-panel" class="hidden absolute top-full left-0 right-0 mt-1 bg-eneba-purple border border-white/20 rounded-lg overflow-hidden z-50"></div>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <button id="auth-btn" class="text-sm hover:text-eneba-green transition">Iniciar sesión</button>
          <button id="cart-btn" class="relative p-2 hover:bg-white/10 rounded-lg" aria-label="Carrito">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-eneba-orange text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold text-black hidden">0</span>
          </button>
        </div>
      </div>
      <nav id="l1-nav" class="max-w-7xl mx-auto px-4 pb-2 flex flex-wrap gap-2"></nav>
    </header>

    <!-- Breadcrumbs -->
    <div id="breadcrumbs" class="max-w-7xl mx-auto px-4 py-2 text-sm flex flex-wrap gap-1 items-center"></div>

    <!-- Main content -->
    <main id="main-content" class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full"></main>

    <!-- Footer -->
    <footer id="site-footer" class="bg-eneba-purple border-t border-white/20 mt-auto"></footer>

    <!-- Cart drawer -->
    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/50 z-50"></div>
    <aside id="cart-drawer" class="cart-drawer fixed top-0 right-0 h-full w-full max-w-md bg-eneba-purple-dark border-l border-white/20 z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
      <div class="p-4 border-b border-white/20 flex justify-between items-center">
        <h2 id="cart-title" class="font-semibold text-lg">Bolsa de compra</h2>
        <button id="cart-close" class="p-1 hover:bg-white/10 rounded" aria-label="Cerrar">&times;</button>
      </div>
      <div id="cart-body" class="flex-1 overflow-y-auto p-4"></div>
      <div id="cart-footer" class="p-4 border-t border-white/20"></div>
    </aside>
  </div>
  <script src="script.js"></script>
</body>
</html>
